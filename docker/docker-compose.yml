version: "3.9"

services:
  # PostgreSQL Database 
  postgres:
    image: postgres:16-alpine
    container_name: langforge_db
    environment:
      POSTGRES_DB: langforge
      POSTGRES_USER: langforge
      POSTGRES_PASSWORD: langforge_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama LLM Server 
  ollama:
    image: ollama/ollama:latest
    container_name: langforge_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # For GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # FastAPI Backend 
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: langforge_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://langforge:langforge_secret@postgres:5432/langforge
      OLLAMA_BASE_URL: http://ollama:11434
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
    volumes:
      - ./uploads:/app/uploads
      - ./faiss_indexes:/app/faiss_indexes
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Frontend 
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: langforge_frontend
    environment:
      API_BASE_URL: http://backend:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
